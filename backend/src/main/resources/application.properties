# ===============================================
# TMDT - Application Configuration
# ===============================================
# Website Kết Nối Phòng Trọ cho Sinh Viên

# ===============================================
# Application Name
# ===============================================
spring.application.name=tmdt-backend

# ===============================================
# SERVER CONFIG
# ===============================================
server.port=8080
server.servlet.context-path=/api

# Jackson JSON Config
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
server.tomcat.max-swallow-size=-1

# ===============================================
# DATABASE CONFIG (PostgreSQL)
# ===============================================
spring.datasource.url=jdbc:postgresql://localhost:5434/tmdt
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================================
# JPA / HIBERNATE
# ===============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=false


# ===============================================
# CACHE CONFIG
# ===============================================
spring.cache.type=simple

# ===============================================
# FILE UPLOAD CONFIG
# ===============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.file-size-threshold=2KB

app.media.storage=local
app.media.base-url=${APP_BASE_URL:http://localhost:8080/api/uploads}
file.upload-dir=uploads

# ===============================================
# MEDIA UPLOAD CONFIG (Chat)
# ===============================================
app.media.max-file-size=52428800
app.media.max-storage-per-user=5368709120
app.media.allowed-types=jpg,jpeg,png,gif,webp,svg,mp4,webm,mov,avi,mkv,mp3,wav,ogg,m4a,aac,flac,amr,pdf,doc,docx

# ===============================================
# JWT CONFIG
