# ===============================================
# VNPAY CONFIG
# ===============================================
vnpay.tmn-code=${VNPAY_TMN_CODE:DFIWVE6I}
vnpay.hash-secret=${VNPAY_HASH_SECRET:FLPGE4AMMSCWSBM6G5X0RP2N2E5J3NSX}
vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:${app.url}/payment/vnpay/return}
vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay/ipn}

# ===============================================
# PAGINATION CONFIG
# ===============================================
spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.size-parameter=per_page

# ===============================================
# ERROR HANDLING & LOGGING
# ===============================================
app.error.show-developer-info=true
app.error.retention-days=30
app.error.async=true
logging.level.fit.nlu.tmdt.modules.recommendation=DEBUG
logging.level.org.hibernate.SQL=DEBUG
# ===============================================
# RATE LIMITING CONFIG
# ===============================================
rate-limit.enabled=true
rate-limit.default=100
rate-limit.login=10
rate-limit.register=5
rate-limit.messages=60
rate-limit.bookings=20

# ===============================================
# POST CONFIG
# ===============================================
post.min-title-length=20
post.max-title-length=200
post.min-description-length=100
post.max-description-length=5000
post.min-images=3
post.max-images=10
post.default-duration-days=30

# ===============================================
# BOOKING CONFIG
# ===============================================
booking.min-advance-hours=2
booking.max-advance-days=14
booking.slot-duration-minutes=30
booking.cancellation-deadline-hours=1
booking.review-deadline-days=30

# ===============================================
# PAYMENT CONFIG
# ===============================================
payment.transaction-timeout-minutes=15
payment.refund-deadline-days=7

# ===============================================
# ADDITIONAL CONFIG
# ===============================================
spring.main.allow-bean-definition-overriding=true

# ===============================================
# WEBSOCKET CONFIG
# ===============================================
spring.rabbitmq.listener.simple.prefetch=1
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# Application URL for CORS
app.url=http://localhost:3000

# ===============================================
# FRONTEND / ENV MIGRATION
# ===============================================
frontend.api.url=http://localhost:8080/api
app.google-maps.api-key=
frontend.app.title=TMDT - Thuê Trọ Online
frontend.app.version=1.0.0
frontend.debug-mode=true
frontend.use-mock-data=false

# Legacy values migrated from frontend/.env.example
gemini.api-key=MY_GEMINI_API_KEY
app.public-url=MY_APP_URL

spring.flyway.baseline-on-migrate=true
